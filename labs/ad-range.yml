name: "ad-range"
description: "AD lab with Windows and Linux hosts, plus Zeek and Suricata sensors"
version: "2.0"
author: "labforge"

settings:
  lab_password: "labforge123!"
  siem_hec_token: "labforge-hec-token"
  siem_hec_port: "8088"

network:
  subnet: "auto"

services:
  - name: dc01
    image: "dockurr/windows"
    hostname: dc01
    ip_offset: 10
    platform: windows-docker
    resources:
      memory: "6g"
      cpus: "2"
    ports:
      - "15110:8006"
    environment:
      VERSION: "2022"
      RAM_SIZE: "6G"
      DISK_SIZE: "64G"
    volumes:
      - dc-data:/storage
    access:
      - label: "Domain Controller (Web)"
        url: "http://localhost:15110"
        credentials:
          username: "Administrator"
          password: "${lab_password}"

  - name: ad-server
    image: "dockurr/windows"
    hostname: ad-server
    ip_offset: 11
    platform: windows-docker
    resources:
      memory: "6g"
      cpus: "2"
    ports:
      - "15111:8006"
      - "15112:3389"
    environment:
      VERSION: "2022"
      RAM_SIZE: "6G"
      DISK_SIZE: "64G"
    volumes:
      - ad-server-data:/storage
    access:
      - label: "AD Server (Web)"
        url: "http://localhost:15111"
      - label: "AD Server RDP"
        url: "rdp://localhost:15112"

  - name: workstation
    image: "dockurr/windows"
    hostname: ws01
    ip_offset: 12
    platform: windows-docker
    resources:
      memory: "4g"
      cpus: "2"
    ports:
      - "15113:8006"
      - "15114:3389"
    environment:
      VERSION: "tiny11"
      RAM_SIZE: "4G"
      DISK_SIZE: "48G"
    volumes:
      - ws-data:/storage
    access:
      - label: "Workstation Desktop (Web)"
        url: "http://localhost:15113"
      - label: "Workstation RDP"
        url: "rdp://localhost:15114"

  - name: linux-server
    image: "kasmweb/ubuntu-focal-desktop:1.16.0"
    hostname: linux-server
    ip_offset: 13
    platform: linux
    resources:
      memory: "4g"
      cpus: "2"
    ports:
      - "15115:6901"
    environment:
      VNC_PW: "${lab_password}"
    volumes:
      - linux-server-data:/home/kasm-user
      - sysmon-logs:/var/log
    restart: unless-stopped
    post_start:
      - "sudo apt-get update && sudo DEBIAN_FRONTEND=noninteractive apt-get install -y rsyslog wget apt-transport-https gnupg || true"
      - "wget -q https://packages.microsoft.com/config/ubuntu/20.04/packages-microsoft-prod.deb -O /tmp/msprod.deb || true"
      - "sudo dpkg -i /tmp/msprod.deb || true"
      - "sudo apt-get update || true"
      - "sudo DEBIAN_FRONTEND=noninteractive apt-get install -y sysmonforlinux || true"
      - "sudo rsyslogd || true"
      - "sudo sysmon -i || true"
    access:
      - label: "Linux Server Desktop (Web)"
        url: "https://localhost:15115"
        credentials:
          username: "kasm_user"
          password: "${lab_password}"

  - name: zeek
    image: "zeek/zeek:latest"
    hostname: zeek
    ip_offset: 14
    platform: linux
    resources:
      memory: "2g"
      cpus: "2"
    cap_add:
      - NET_ADMIN
      - NET_RAW
    command: "zeek -i any local"
    volumes:
      - zeek-logs:/usr/local/zeek/logs
    restart: unless-stopped
    access:
      - label: "Zeek Logs"
        url: "Volume: zeek-logs"

  - name: suricata
    image: "jasonish/suricata:latest"
    hostname: suricata
    ip_offset: 15
    platform: linux
    resources:
      memory: "2g"
      cpus: "2"
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_NICE
    command: "suricata -i any"
    volumes:
      - suricata-logs:/var/log/suricata
    restart: unless-stopped
    access:
      - label: "Suricata Logs"
        url: "Volume: suricata-logs"

volumes:
  dc-data: {}
  ad-server-data: {}
  ws-data: {}
  linux-server-data: {}
  sysmon-logs: {}
  windows-event-logs: {}
  snort-logs: {}
  zeek-logs: {}
  suricata-logs: {}
